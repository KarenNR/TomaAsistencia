<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis cursos</title>
    <!--App styles-->
    <link href="/static/css/styles.css" rel="stylesheet" type="text/css" />
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <!--Fontawesome-->
    <script src="https://kit.fontawesome.com/98c42d1474.js" crossorigin="anonymous"></script>
    <!--Highcharts-->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
</head>

<body>
    <header>
        <div class="container">
            <div class="row m-0 py-2 justify-content-between align-items-center">
                <div class="col-auto">
                    <i class="fa-solid fa-user"></i>&nbsp;&nbsp;{{ profesor }}
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-light" onclick="logout()">
                        Cerrar sesión <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container py-4">
        <div class="row m-0 mb-5 gy-3">
            <h1 class="mb-4">Alumno {{ estudiante }}</h1>
            <p>Curso {{ curso }}</p>
        </div>
    </div>

    <footer>
        Copyright © 2024
    </footer>

    <script>
        function logout() {
            window.location.href = "/";
        }
    </script>
</body>

</html>
